<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вечность — философский триллер</title>
  <meta name="description" content="Атмосферный сайт книги «Вечность» — философский триллер Александра Российского.">
  <meta property="og:title" content="Вечность — философский триллер">
  <meta property="og:description" content="То, что ты ищешь — уже ищет тебя.">
  <meta property="og:image" content="assets/full-mockup-1280.jpg">
  <link rel="preload" as="image" href="assets/hero.jpg">
  <link rel="preload" as="image" href="assets/bar.jpg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="site" aria-label="Сайт книги Вечность">
    <div class="stage">

      <section class="scene scene--hero" id="hero">
        <img src="assets/hero.jpg" alt="Вечность — hero" loading="eager">
        
      </section>

      <section class="scene scene--bar" id="bar">
        <img src="assets/bar.jpg" alt="Вечность — bar" loading="eager">
        
      </section>

      <section class="scene scene--memory" id="memory">
        <img src="assets/memory.jpg" alt="Вечность — memory" loading="lazy">
        
      </section>

      <section class="scene scene--tram" id="tram">
        <img src="assets/tram.jpg" alt="Вечность — tram" loading="lazy">
        
      </section>

      <section class="scene scene--four-paths" id="four-paths">
        <img src="assets/four-paths.jpg" alt="Вечность — four-paths" loading="lazy">
        
      </section>

      <section class="scene scene--door" id="door">
        <img src="assets/door.jpg" alt="Вечность — door" loading="lazy">
        
      </section>

      <section class="scene scene--book" id="book">
        <img src="assets/book.jpg" alt="Вечность — book" loading="lazy">
        
      </section>

      <section class="scene scene--genres" id="genres">
        <img src="assets/genres.jpg" alt="Вечность — genres" loading="lazy">
        
      </section>

      <section class="scene scene--final" id="final">
        <img src="assets/final.jpg" alt="Вечность — final" loading="lazy">
        <a class="cta-overlay" href="#access" aria-label="Начать путь"></a>
      </section>
    </div>

    <div class="seo-text" aria-hidden="false">
      <h1>Вечность</h1>
      <p>Философский триллер Александра Российского.</p>
      <p>Память — это цена, которую мы платим за реальность.</p>
      <p>Четыре пути. Один выбор.</p>
      <p>То, что ты ищешь — уже ищет тебя.</p>
    </div>
  </main>
</body>
</html>
